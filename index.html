<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEREL - Promptbibliotheek</title>
</head>
<body>

<h2>Promptbibliotheek (demo)</h2>
<div id="output"></div>

<script>
// ================= DATA =================
const STORAGE_KEY = 'gemeente_Leiden_prompts';

const DEFAULT_PROMPTS = [
  {
    id: 1,
    title: "Technisch ontwerpdocument",
    category: "documentatie",
    model: "ChatGPT",
    prompt: "Schrijf een technisch ontwerpdocument..."
  }
];

// ================= STATE =================
let prompts = [];

// ================= LOAD =================
function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  prompts = saved ? JSON.parse(saved) : [...DEFAULT_PROMPTS];
}

// ================= EXTERNAL LOAD =================
async function loadExternalPrompts() {
  try {
    const res = await fetch('https://gemeente-leiden.github.io/prompt-bibliotheek/data/prompts-chat.json');
    const data = await res.json();

    const maxId = Math.max(0, ...prompts.map(p => p.id));

    const mapped = data.map((p, i) => ({
      id: maxId + i + 1,
      title: p.title || "Extern prompt",
      category: mapCategory(p),
      model: "ChatGPT",
      author: "prompts.chat",
      prompt: p.prompt
    }));

    prompts = [...prompts, ...mapped];

  } catch (e) {
    console.error("Fout bij laden externe prompts", e);
  }
}

// ================= CATEGORY =================
function mapCategory(p) {
  if (!p.tags) return 'documentatie';

  if (p.tags.includes('dev')) return 'code';
  if (p.tags.includes('writing')) return 'communicatie';

  return 'documentatie';
}

// ================= TRANSLATION =================
function isEnglish(text) {
  return /^[\x00-\x7F]*$/.test(text);
}

async function autoTranslatePrompt(text) {
  const apiKey = localStorage.getItem("apiKey");
  if (!apiKey) return text;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: "Vertaal naar Nederlands:\n\n" + text
        }]
      })
    });

    const data = await res.json();
    return data.content?.[0]?.text || text;

  } catch {
    return text;
  }
}

// ================= RENDER =================
function render() {
  const el = document.getElementById('output');

  el.innerHTML = prompts.map(p => `
    <div style="border:1px solid #ccc; padding:10px; margin:10px">
      <b>${p.title}</b><br>
      <small>${p.category} | ${p.model}</small>
      <pre>${p.prompt}</pre>
    </div>
  `).join('');
}

// ================= INIT =================
async function init() {
  loadData();
  await loadExternalPrompts();
  render();
}

init();

</script>
</body>
</html>
