name: Sync prompts.chat

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone prompts.chat
        run: git clone https://github.com/f/prompts.chat.git external

      - name: Create script
        run: |
          cat > script.py << 'EOF'
import json
import os

prompts = []

for root, dirs, files in os.walk("external"):
    for file in files:
        if file.endswith(".md"):
            path = os.path.join(root, file)
            try:
                with open(path, "r", encoding="utf-8") as f:
                    text = f.read()
                    if len(text) > 100:
                        prompts.append({
                            "title": file,
                            "prompt": text
                        })
            except Exception as e:
                print(e)

os.makedirs("data", exist_ok=True)

with open("data/prompts-chat.json", "w", encoding="utf-8") as f:
    json.dump(prompts, f)
EOF

      - name: Run script
        run: python3 script.py

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/prompts-chat.json
          git commit -m "update prompts" || echo "no changes"
          git push
