name: Sync prompts.chat

on:
  schedule:
    - cron: '0 6 * * *'   # elke dag 06:00
  workflow_dispatch:       # handmatig starten

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout eigen repo
        uses: actions/checkout@v4

      - name: Clone prompts.chat
        run: |
          git clone https://github.com/f/prompts.chat.git external

 - name: Extract prompts naar JSON
  run: |
    python3 - <<EOF
import json
import os

prompts = []

def extract_title(text, filename):
    for line in text.split("\n"):
        if line.startswith("# "):
            return line.replace("# ", "").strip()
    return filename.replace(".md", "")

for root, dirs, files in os.walk("external"):
    for file in files:
        if file.endswith(".md"):
            path = os.path.join(root, file)
            try:
                with open(path, "r", encoding="utf-8") as f:
                    text = f.read()

                    if len(text) > 100:
                        prompts.append({
                            "title": extract_title(text, file),
                            "prompt": text,
                            "tags": ["external"]
                        })

            except Exception as e:
                print(f"Error reading {file}: {e}")

os.makedirs("data", exist_ok=True)

with open("data/prompts-chat.json", "w", encoding="utf-8") as f:
    json.dump(prompts, f, indent=2, ensure_ascii=False)
EOF

      - name: Commit wijzigingen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/prompts-chat.json
          git commit -m "Auto sync prompts" || echo "No changes"
          git push
